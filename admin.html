<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<style>
body{
    font-family:Arial;
    background:#f2f2f2;
    text-align:center;
}
.box{
    width:500px;
    margin:50px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}
button{
    width:250px;
    padding:12px;
    margin:10px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
button:hover{
    background:#0056b3;
}
</style>
</head>
<body>

<div class="box">
<h1>Admin Dashboard</h1>

<button onclick="location.href='students.html'">View Students</button><br>

<button onclick="location.href='companies.html'">Manage Companies</button><br>

<button onclick="location.href='applications.html'">View Applications</button><br>

<button onclick="location.href='index.html'">Logout</button>

</div>

</body>
</html>
